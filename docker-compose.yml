services:
  ehr-dq:
    build: .
    image: ehr-data-quality-checker:latest
    container_name: ehr-dq
    ports:
      - "8000:8000"
    environment:
      PORT: "8000"
      # Tune upload guard rails if needed:
      # EHR_MAX_UPLOAD_BYTES: "26214400"
      # EHR_MAX_ROWS: "500000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/api/health').status==200 else 1)"]
      interval: 30s
      timeout: 3s
      retries: 3
