name: Publish

# Publish a release on a version tag (e.g. v1.0.0):
#   - the Python package to PyPI
#   - the container image to GitHub Container Registry (GHCR)
on:
  push:
    tags: ["v*"]

jobs:
  pypi:
    name: Build & publish to PyPI
    runs-on: ubuntu-latest
    # Opt-in: set repo variable PYPI_PUBLISH=true once Trusted Publishing is
    # configured on PyPI, so the first release doesn't fail on an unset publisher.
    if: ${{ vars.PYPI_PUBLISH == 'true' }}
    permissions:
      id-token: write        # PyPI Trusted Publishing (no API token needed)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Check the artifacts
        run: |
          python -m pip install twine
          twine check dist/*
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Configure Trusted Publishing on PyPI for this repo, OR set a token:
        # with:
        #   password: ${{ secrets.PYPI_API_TOKEN }}

  docker:
    name: Build & push image to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
