name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Regenerate sample data (must be reproducible)
        run: |
          python sample_data/make_dirty.py
          python sample_data/fhir/make_fhir_sample.py
          python sample_data/hl7/make_hl7_sample.py

      - name: Run test suite
        run: pytest -q

      - name: Smoke-test the CLI
        run: |
          python -m app.cli profiles
          python -m app.cli audit --variant dirty

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t ehr-data-quality-checker:ci .
      - name: Boot container and hit health endpoint
        run: |
          docker run -d --name ehr -p 8000:8000 ehr-data-quality-checker:ci
          for i in $(seq 1 15); do
            if curl -sf http://127.0.0.1:8000/api/health; then echo "ok"; exit 0; fi
            sleep 2
          done
          echo "service did not become healthy"; docker logs ehr; exit 1
